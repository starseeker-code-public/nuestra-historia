version: '3.9'

services:
  backend:
    build: ./backend
    container_name: nuestra-historia-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite:///./data/nuestra_historia.db
      UPLOAD_DIR: /app/uploads
    volumes:
      - db_data:/app/data
      - uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8742}:8000"
    networks:
      - app_net

  frontend:
    build: ./frontend
    container_name: nuestra-historia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3742}:80"
    networks:
      - app_net

volumes:
  db_data:
  uploads:

networks:
  app_net:
    driver: bridge
